<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980">
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .lane { fill: #ffffff; stroke: #d7dde8; stroke-width: 2; }
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 10; ry: 10; }
      .capture { fill: #e0f2fe; stroke: #0369a1; }
      .buffer { fill: #fef3c7; stroke: #b45309; }
      .render { fill: #dcfce7; stroke: #15803d; }
      .ai { fill: #ede9fe; stroke: #6d28d9; }
      .main { fill: #fee2e2; stroke: #b91c1c; }
      .event { fill: #fce7f3; stroke: #be185d; }
      .store { fill: #e5e7eb; stroke: #4b5563; }
      .title { font: 700 34px "Segoe UI", Arial, sans-serif; fill: #111827; }
      .subtitle { font: 500 18px "Segoe UI", Arial, sans-serif; fill: #4b5563; }
      .lane-title { font: 700 20px "Segoe UI", Arial, sans-serif; fill: #111827; }
      .text { font: 600 17px "Segoe UI", Arial, sans-serif; fill: #111827; }
      .small { font: 500 14px "Segoe UI", Arial, sans-serif; fill: #374151; }
      .tiny { font: 500 12px "Segoe UI", Arial, sans-serif; fill: #4b5563; }
      .arrow { stroke: #374151; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
      .tcp { stroke: #6d28d9; stroke-width: 3; fill: none; marker-end: url(#arrowhead-purple); stroke-dasharray: 8 5; }
      .http { stroke: #b91c1c; stroke-width: 3; fill: none; marker-end: url(#arrowhead-red); stroke-dasharray: 8 5; }
      .note { fill: #111827; font: 700 14px "Segoe UI", Arial, sans-serif; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#374151"/>
    </marker>
    <marker id="arrowhead-purple" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#6d28d9"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#b91c1c"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="980"/>

  <text class="title" x="60" y="62">StudySync Client Real-time Vision Pipeline</text>
  <text class="subtitle" x="60" y="94">정태현 - 클라이언트 / AI 서버 TCP / 메인 서버 HTTP + Claim Check</text>

  <rect class="lane" x="50" y="130" width="880" height="770" rx="18"/>
  <text class="lane-title" x="80" y="168">Client Process (MFC + OpenCV + Direct2D)</text>

  <rect class="lane" x="980" y="130" width="460" height="310" rx="18"/>
  <text class="lane-title" x="1010" y="168">AI Server</text>

  <rect class="lane" x="980" y="500" width="460" height="400" rx="18"/>
  <text class="lane-title" x="1010" y="538">Main Server + Storage Metadata</text>

  <!-- Client blocks -->
  <rect class="box capture" x="90" y="210" width="230" height="90"/>
  <text class="text" x="120" y="245">CaptureThread</text>
  <text class="small" x="120" y="272">Webcam 30fps</text>
  <text class="tiny" x="120" y="292">cv::Mat BGR frames</text>

  <rect class="box buffer" x="380" y="170" width="230" height="90"/>
  <text class="text" x="410" y="204">Render RingBuffer</text>
  <text class="small" x="410" y="231">latest frame overwrite</text>
  <text class="tiny" x="410" y="249">wait_pop for render</text>

  <rect class="box buffer" x="380" y="290" width="230" height="90"/>
  <text class="text" x="410" y="324">Send RingBuffer</text>
  <text class="small" x="410" y="351">AI sampling source</text>
  <text class="tiny" x="410" y="369">try_pop, drain old frames</text>

  <rect class="box buffer" x="380" y="410" width="230" height="90"/>
  <text class="text" x="410" y="444">EventShadowBuffer</text>
  <text class="small" x="410" y="471">recent frames window</text>
  <text class="tiny" x="410" y="489">snapshot on event</text>

  <rect class="box render" x="680" y="170" width="210" height="90"/>
  <text class="text" x="710" y="204">RenderThread</text>
  <text class="small" x="710" y="231">Direct2D upload</text>
  <text class="tiny" x="710" y="249">CopyFromMemory + DrawBitmap</text>

  <rect class="box render" x="680" y="290" width="210" height="90"/>
  <text class="text" x="710" y="324">OverlayPainter</text>
  <text class="small" x="710" y="351">landmarks / HUD</text>
  <text class="tiny" x="710" y="369">latest AnalysisResult</text>

  <rect class="box ai" x="680" y="410" width="210" height="90"/>
  <text class="text" x="710" y="444">AiTcpClient</text>
  <text class="small" x="710" y="471">5fps JPEG frames</text>
  <text class="tiny" x="710" y="489">protocol 2000 / 2001</text>

  <rect class="box event" x="680" y="540" width="210" height="90"/>
  <text class="text" x="710" y="574">PostureEventDetector</text>
  <text class="small" x="710" y="601">neck / EAR / absent</text>
  <text class="tiny" x="710" y="619">push event when triggered</text>

  <rect class="box event" x="380" y="650" width="230" height="90"/>
  <text class="text" x="410" y="684">EventQueue</text>
  <text class="small" x="410" y="711">event clip metadata</text>
  <text class="tiny" x="410" y="729">async upload worker</text>

  <rect class="box store" x="90" y="650" width="230" height="90"/>
  <text class="text" x="120" y="684">Local Clip Store</text>
  <text class="small" x="120" y="711">mp4 / zip on client</text>
  <text class="tiny" x="120" y="729">retention: 3 days</text>

  <rect class="box main" x="680" y="650" width="210" height="90"/>
  <text class="text" x="710" y="684">EventUploadThread</text>
  <text class="small" x="710" y="711">HTTP JSONL</text>
  <text class="tiny" x="710" y="729">claim-check metadata</text>

  <!-- AI server blocks -->
  <rect class="box ai" x="1030" y="210" width="360" height="90"/>
  <text class="text" x="1060" y="244">TCP Listener :9100</text>
  <text class="small" x="1060" y="271">read 4-byte JSON length + JPEG</text>
  <text class="tiny" x="1060" y="289">FRAME_PUSH protocol_no = 2000</text>

  <rect class="box ai" x="1030" y="330" width="360" height="80"/>
  <text class="text" x="1060" y="363">Pose / Focus Inference</text>
  <text class="small" x="1060" y="390">respond ANALYSIS_RES = 2001</text>

  <!-- Main server blocks -->
  <rect class="box main" x="1030" y="580" width="360" height="90"/>
  <text class="text" x="1060" y="614">HTTP APIs</text>
  <text class="small" x="1060" y="641">auth / session / events</text>
  <text class="tiny" x="1060" y="659">JSON or JSONL metadata</text>

  <rect class="box store" x="1030" y="720" width="360" height="90"/>
  <text class="text" x="1060" y="754">DB Metadata</text>
  <text class="small" x="1060" y="781">users / sessions / posture_events</text>
  <text class="tiny" x="1060" y="799">no raw video by default</text>

  <!-- Arrows -->
  <path class="arrow" d="M320 235 L380 215"/>
  <path class="arrow" d="M320 255 L380 335"/>
  <path class="arrow" d="M320 275 L380 455"/>

  <path class="arrow" d="M610 215 L680 215"/>
  <path class="arrow" d="M785 260 L785 290"/>
  <path class="arrow" d="M610 335 L680 455"/>
  <path class="tcp" d="M890 455 C960 455 960 255 1030 255"/>
  <path class="tcp" d="M1030 370 C960 370 960 455 890 455"/>

  <path class="arrow" d="M785 500 L785 540"/>
  <path class="arrow" d="M680 585 C620 585 620 455 610 455"/>
  <path class="arrow" d="M680 585 L610 695"/>
  <path class="arrow" d="M380 695 L320 695"/>
  <path class="arrow" d="M610 695 L680 695"/>

  <path class="http" d="M890 695 C960 695 960 625 1030 625"/>
  <path class="arrow" d="M1210 670 L1210 720"/>

  <!-- Notes -->
  <rect x="90" y="795" width="800" height="70" rx="12" fill="#111827"/>
  <text class="note" x="120" y="825" fill="#ffffff">핵심 검증 질문: AI 서버는 9100 TCP에서 4-byte big-endian JSON length를 읽고, image_size만큼 JPEG를 읽은 뒤 2001 JSON을 같은 소켓으로 응답하는가?</text>
  <text class="tiny" x="120" y="850" fill="#d1d5db">렌더링은 AI 응답을 기다리지 않으며, 이벤트 클립 원본은 기본적으로 클라이언트 로컬에 보관합니다.</text>
</svg>
